<style>
  :root{
    --bg:#F3EEE9; --paper:#FBF8F4; --ink:#2B2622; --muted:#8A817A;
    --accent:#9C6B5E; --accentSoft:#EFE4DF; --line:#E5DBD3; --danger:#B4423A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:Inter, system-ui, -apple-system, sans-serif;
    padding-top:env(safe-area-inset-top);
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none!important;} }
  .serif{font-family:Fraunces, Georgia, serif;}
  .wrap{max-width:480px;margin:0 auto;padding:26px 20px 130px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:15px;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .ico{height:36px;width:36px;display:grid;place-items:center;border-radius:9999px;
       background:var(--paper);border:1px solid var(--line);color:var(--ink);}
  .field{width:100%;border-radius:12px;padding:10px 14px;background:#fff;
         border:1px solid var(--line);color:var(--ink);}
  textarea.field{resize:vertical;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;}
  .primary{background:var(--accent);color:#fff;border-radius:12px;font-weight:500;}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:9999px;
        padding:8px 13px;font-size:14px;background:#fff;border:1px solid var(--line);color:var(--ink);}
  .chip-on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .chip-price{opacity:.8;}
  .label{display:block;font-size:12px;font-weight:500;margin-bottom:6px;color:var(--muted);}
  .overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;
           justify-content:center;background:rgba(43,38,34,.28);}
  .sheet{width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
         background:var(--bg);border-radius:24px 24px 0 0;padding:20px;
         padding-bottom:calc(20px + env(safe-area-inset-bottom));}
  @media(min-width:540px){ .overlay{align-items:center;} .sheet{border-radius:24px;} }
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
         background:var(--ink);color:#fff;font-size:14px;padding:8px 16px;
         border-radius:9999px;box-shadow:0 6px 20px rgba(0,0,0,.18);z-index:60;}
  .fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:50%;
       transform:translateX(-50%);height:56px;padding:0 24px;border-radius:9999px;
       display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;
       font-weight:500;box-shadow:0 8px 24px rgba(156,107,94,.4);z-index:40;}
  .tabnum{font-variant-numeric:tabular-nums;}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>
<div id="app"></div>
<input id="fileInput" type="file" accept="application/json,.json" style="display:none">
<script>
"use strict";

/* ============ datos ============ */
const STORAGE_KEY = "agenda_data";
const SERVICIOS_DEFAULT = [
  { nombre:"Manicura completa", precio:25 },
  { nombre:"Pedicura completa", precio:null },
  { nombre:"Pedicura sencilla", precio:null },
  { nombre:"Pedicura spa", precio:null },
  { nombre:"Extensión de uñas", precio:null },
  { nombre:"Diseños", precio:null },
];

/* ============ iconos ============ */
const PATHS = {
  "chevron-left":'<polyline points="15 18 9 12 15 6"/>',
  "chevron-right":'<polyline points="9 18 15 12 9 6"/>',
  "plus":'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  "x":'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  "search":'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  "calendar":'<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  "settings":'<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>',
  "trash":'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  "pencil":'<path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
  "download":'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  "upload":'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  "clock":'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  "check":'<polyline points="20 6 9 17 4 12"/>',
};
function icon(name, size){
  size = size || 18;
  const s = document.createElement("span");
  s.style.display = "inline-flex";
  s.innerHTML = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(PATHS[name]||"")+'</svg>';
  return s;
}

/* ============ helpers ============ */
const $ = (s)=>document.querySelector(s);
function el(tag, attrs){
  const n = document.createElement(tag);
  attrs = attrs || {};
  for(const k in attrs){
    const v = attrs[k];
    if(v==null) continue;
    if(k==="class") n.className = v;
    else if(k==="style" && typeof v==="object") Object.assign(n.style, v);
    else if(k.slice(0,2)==="on" && typeof v==="function") n.addEventListener(k.slice(2).toLowerCase(), v);
    else n.setAttribute(k, v);
  }
  for(let i=2;i<arguments.length;i++){
    let kid = arguments[i];
    if(Array.isArray(kid)){ kid.forEach(c=>append(n,c)); }
    else append(n, kid);
  }
  return n;
}
function append(n, kid){
  if(kid==null || kid===false) return;
  n.appendChild(typeof kid==="object" ? kid : document.createTextNode(String(kid)));
}

const pad = (n)=>String(n).padStart(2,"0");
const toKey = (d)=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const fromKey = (k)=>{ const p=k.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); };
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
const DIAS_CORTO = ["L","M","X","J","V","S"];
const fmtMes = (d)=>new Intl.DateTimeFormat("es-ES",{month:"long",year:"numeric"}).format(d);
const fmtDiaLargo = (d)=>new Intl.DateTimeFormat("es-ES",{weekday:"long",day:"numeric",month:"long"}).format(d);
const cap = (s)=> s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
const eur = (n)=> (Number.isInteger(n)? n : n.toFixed(2)) + " €";
const normTxt = (s)=> (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

function normServicios(arr){
  return (arr||[]).map(s => typeof s==="string"
    ? { nombre:s, precio:null }
    : { nombre:s.nombre, precio: typeof s.precio==="number"? s.precio : null });
}
function normCitas(citas){
  const out = {};
  for(const k in (citas||{})){
    out[k] = (citas[k]||[]).map(c=>{
      let servicios = c.servicios;
      if(!Array.isArray(servicios)) servicios = c.servicio ? [c.servicio] : [];
      return { id:c.id, hora:c.hora||"", clienta:c.clienta||"", servicios:servicios, notas:c.notas||"" };
    });
  }
  return out;
}

/* ============ estado ============ */
let state = { citas:{}, servicios:SERVICIOS_DEFAULT, incluirSabado:true };
let selectedKey = toKey(new Date());

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const p = JSON.parse(raw);
      const s = normServicios(p.servicios);
      state = {
        citas: normCitas(p.citas),
        servicios: s.length ? s : SERVICIOS_DEFAULT,
        incluirSabado: typeof p.incluirSabado==="boolean" ? p.incluirSabado : true,
      };
    }
  }catch(e){}
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ toast("No se pudo guardar"); }
}

function precioDe(nombre){ const s=state.servicios.find(x=>x.nombre===nombre); return s && typeof s.precio==="number"? s.precio : 0; }
function totalCita(c){ return (c.servicios||[]).reduce((t,n)=>t+precioDe(n),0); }

function clientasRecientes(){
  const seen = new Map();
  Object.keys(state.citas).sort().forEach(k=>{
    state.citas[k].forEach(c=>{
      if(!c.clienta) return;
      if(seen.has(c.clienta)) seen.delete(c.clienta);
      seen.set(c.clienta, k);
    });
  });
  return Array.from(seen.keys()).reverse();
}

/* ============ toast ============ */
let toastTimer=null;
function toast(msg){
  const old = $(".toast"); if(old) old.remove();
  const t = el("div",{class:"toast"}, msg);
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.remove(), 2200);
}

/* ============ vista principal ============ */
function render(){
  const app = $("#app");
  app.innerHTML = "";
  app.appendChild(buildMain());
}

function buildMain(){
  const wrap = el("div",{class:"wrap"});

  // cabecera
  const header = el("header",{style:{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:"18px"}});
  const titleBox = el("div",{},
    el("h1",{class:"serif",style:{fontSize:"30px",lineHeight:"1",letterSpacing:"-.5px",margin:"0"}},"Agenda"),
    el("p",{style:{fontSize:"12px",margin:"4px 0 0",color:"var(--muted)"}},"Copia de seguridad de tus citas")
  );
  const headBtns = el("div",{style:{display:"flex",gap:"8px"}},
    el("button",{class:"ico","aria-label":"Calendario", onClick:openMonthView}, icon("calendar",17)),
    el("button",{class:"ico","aria-label":"Buscar", onClick:openSearch}, icon("search",17)),
    el("button",{class:"ico","aria-label":"Ajustes", onClick:openSettings}, icon("settings",17))
  );
  header.appendChild(titleBox); header.appendChild(headBtns);
  wrap.appendChild(header);

  const selDate = fromKey(selectedKey);
  const wkStart = startOfWeek(selDate);
  const numDias = state.incluirSabado ? 6 : 5;
  const todayKey = toKey(new Date());

  // navegación semana
  const nav = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}});
  nav.appendChild(el("button",{class:"ico","aria-label":"Semana anterior",
    onClick:()=>{ selectedKey = toKey(addDays(selDate,-7)); render(); }}, icon("chevron-left",18)));
  const center = el("div",{style:{textAlign:"center"}},
    el("p",{class:"serif",style:{fontSize:"16px",margin:"0"}}, cap(fmtMes(wkStart))));
  if(selectedKey !== todayKey){
    center.appendChild(el("button",{style:{fontSize:"12px",color:"var(--accent)",textDecoration:"underline",textUnderlineOffset:"2px",marginTop:"2px"},
      onClick:()=>{ selectedKey = todayKey; render(); }},"Ir a hoy"));
  }
  nav.appendChild(center);
  nav.appendChild(el("button",{class:"ico","aria-label":"Semana siguiente",
    onClick:()=>{ selectedKey = toKey(addDays(selDate,7)); render(); }}, icon("chevron-right",18)));
  wrap.appendChild(nav);

  // tira de días
  const strip = el("div",{style:{display:"grid",gap:"6px",gridTemplateColumns:"repeat("+numDias+",minmax(0,1fr))",marginBottom:"24px"}});
  for(let i=0;i<numDias;i++){
    const d = addDays(wkStart,i);
    const k = toKey(d);
    const isSel = k===selectedKey;
    const isToday = k===todayKey;
    const count = (state.citas[k]||[]).length;
    const cell = el("button",{style:{position:"relative",borderRadius:"16px",padding:"10px 0",
      display:"flex",flexDirection:"column",alignItems:"center",
      background:isSel?"var(--accent)":"var(--paper)",
      border:"1px solid "+(isSel?"var(--accent)":"var(--line)"),
      color:isSel?"#fff":"var(--ink)"},
      onClick:()=>{ selectedKey=k; render(); }},
      el("span",{style:{fontSize:"10px",textTransform:"uppercase",letterSpacing:".5px",color:isSel?"rgba(255,255,255,.8)":"var(--muted)"}}, DIAS_CORTO[i]),
      el("span",{class:"serif",style:{fontSize:"18px",lineHeight:"1.1"}}, String(d.getDate()))
    );
    if(isToday && !isSel){
      cell.appendChild(el("span",{style:{position:"absolute",bottom:"5px",height:"4px",width:"4px",borderRadius:"9999px",background:"var(--accent)"}}));
    }
    if(count>0){
      cell.appendChild(el("span",{style:{position:"absolute",top:"-4px",right:"-4px",minWidth:"16px",height:"16px",padding:"0 4px",
        display:"grid",placeItems:"center",borderRadius:"9999px",fontSize:"10px",fontWeight:"600",
        background:isSel?"#fff":"var(--accent)",color:isSel?"var(--accent)":"#fff"}}, String(count)));
    }
    strip.appendChild(cell);
  }
  wrap.appendChild(strip);

  // encabezado del día + total
  const citas = (state.citas[selectedKey]||[]).slice().sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));
  const totalDia = citas.reduce((t,c)=>t+totalCita(c),0);
  const dayHead = el("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:"12px"}});
  dayHead.appendChild(el("h2",{class:"serif",style:{fontSize:"20px",margin:"0"}}, cap(fmtDiaLargo(selDate))));
  const rightInfo = el("div",{style:{textAlign:"right",fontSize:"12px",color:"var(--muted)"}}, citas.length+" "+(citas.length===1?"cita":"citas"));
  if(totalDia>0) rightInfo.appendChild(el("span",{style:{display:"block",fontWeight:"600",color:"var(--accent)"}}, eur(totalDia)));
  dayHead.appendChild(rightInfo);
  wrap.appendChild(dayHead);

  // lista de citas
  const list = el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
  if(citas.length===0){
    list.appendChild(el("div",{class:"card",style:{padding:"32px 16px",textAlign:"center",borderStyle:"dashed",color:"var(--muted)"}},
      el("p",{style:{fontSize:"14px",margin:"0"}},"Sin citas este día."),
      el("p",{style:{fontSize:"12px",margin:"4px 0 0"}},"Pulsa el botón + para añadir una.")
    ));
  } else {
    citas.forEach(c=>{
      const precio = totalCita(c);
      const card = el("button",{class:"card",style:{textAlign:"left",padding:"12px 16px",display:"flex",alignItems:"flex-start",gap:"12px"},
        onClick:()=>openCita(selectedKey,c)});
      card.appendChild(el("span",{style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"14px",fontWeight:"600",color:"var(--accent)",paddingTop:"2px",whiteSpace:"nowrap"},class:"tabnum"},
        icon("clock",13), c.hora||"—"));
      const mid = el("span",{style:{flex:"1",minWidth:"0"}},
        el("span",{class:"truncate",style:{display:"block",fontSize:"15px",fontWeight:"500"}}, c.clienta),
        el("span",{class:"truncate",style:{display:"block",fontSize:"14px",color:"var(--muted)"}}, (c.servicios||[]).join(" + ")||"Sin servicio")
      );
      if(c.notas) mid.appendChild(el("span",{class:"truncate",style:{display:"block",fontSize:"12px",marginTop:"2px",color:"var(--muted)"}}, c.notas));
      card.appendChild(mid);
      const right = el("span",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",paddingTop:"2px"}});
      if(precio>0) right.appendChild(el("span",{class:"tabnum",style:{fontSize:"14px",fontWeight:"600"}}, eur(precio)));
      right.appendChild(el("span",{style:{marginTop:"4px",color:"var(--muted)"}}, icon("pencil",14)));
      card.appendChild(right);
      list.appendChild(card);
    });
  }
  wrap.appendChild(list);

  // botón flotante
  const fab = el("button",{class:"fab", onClick:()=>openCita(selectedKey,null)}, icon("plus",20), "Añadir cita");
  wrap.appendChild(fab);

  return wrap;
}

/* ============ overlay ============ */
function closeOverlays(){ document.querySelectorAll(".overlay").forEach(o=>o.remove()); }
function buildSheet(){
  const overlay = el("div",{class:"overlay", onClick:closeOverlays});
  const sheet = el("div",{class:"sheet", onClick:(e)=>e.stopPropagation()});
  overlay.appendChild(sheet);
  return { overlay, sheet };
}

/* ============ modal cita ============ */
function openCita(dateKey, cita){
  closeOverlays();
  let sel = cita ? (cita.servicios||[]).slice() : [];
  const { overlay, sheet } = buildSheet();

  const head = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"2px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}}, cita?"Editar cita":"Nueva cita"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  );
  sheet.appendChild(head);
  sheet.appendChild(el("p",{style:{fontSize:"12px",margin:"0 0 16px",color:"var(--muted)"}}, cap(fmtDiaLargo(fromKey(dateKey)))));

  const horaInput = el("input",{class:"field",type:"time"});
  horaInput.value = cita ? (cita.hora||"10:00") : "10:00";
  const clientaInput = el("input",{class:"field",placeholder:"Nombre de la clienta"});
  clientaInput.value = cita ? (cita.clienta||"") : "";
  const notasInput = el("textarea",{class:"field",rows:"2",placeholder:"Color, detalles…"});
  notasInput.value = cita ? (cita.notas||"") : "";

  const chips = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  const totalLine = el("p",{style:{fontSize:"14px",margin:"8px 0 0",fontWeight:"600",color:"var(--accent)"}});
  function renderChips(){
    chips.innerHTML="";
    state.servicios.forEach(s=>{
      const on = sel.indexOf(s.nombre)>=0;
      const chip = el("button",{class:"chip"+(on?" chip-on":""), onClick:()=>{
        const i=sel.indexOf(s.nombre);
        if(i>=0) sel.splice(i,1); else sel.push(s.nombre);
        renderChips();
      }});
      if(on) chip.appendChild(icon("check",14));
      chip.appendChild(document.createTextNode(s.nombre));
      if(typeof s.precio==="number") chip.appendChild(el("span",{class:"chip-price"}," · "+eur(s.precio)));
      chips.appendChild(chip);
    });
    const total = sel.reduce((t,n)=>t+precioDe(n),0);
    totalLine.textContent = total>0 ? "Total: "+eur(total) : "";
  }
  renderChips();

  const err = el("p",{style:{fontSize:"12px",color:"var(--danger)",margin:"0"}});

  const suggBox = el("div",{style:{display:"none",flexDirection:"column",gap:"4px",marginTop:"6px"}});
  function renderSugerencias(){
    const q = normTxt(clientaInput.value.trim());
    const todas = clientasRecientes();
    const filtradas = q
      ? todas.filter(n=> normTxt(n).indexOf(q)>=0 && normTxt(n)!==q)
      : todas.slice(0,5);
    suggBox.innerHTML = "";
    if(filtradas.length===0){ suggBox.style.display="none"; return; }
    suggBox.style.display = "flex";
    filtradas.slice(0,5).forEach(n=>{
      suggBox.appendChild(el("button",{type:"button",
        style:{textAlign:"left",padding:"8px 12px",borderRadius:"10px",fontSize:"14px",
          background:"#fff",border:"1px solid var(--line)",color:"var(--ink)"},
        onClick:()=>{ clientaInput.value=n; suggBox.style.display="none"; suggBox.innerHTML=""; }
      }, n));
    });
  }
  clientaInput.addEventListener("focus", renderSugerencias);
  clientaInput.addEventListener("input", ()=>{ err.textContent=""; renderSugerencias(); });
  clientaInput.addEventListener("blur", ()=>{ setTimeout(()=>{ suggBox.style.display="none"; }, 150); });

  const body = el("div",{style:{display:"flex",flexDirection:"column",gap:"14px"}},
    el("div",{}, el("label",{class:"label"},"Hora"), horaInput),
    el("div",{}, el("label",{class:"label"},"Clienta"), clientaInput, suggBox),
    el("div",{}, el("label",{class:"label"},"Servicios (puedes elegir varios)"), chips, totalLine),
    el("div",{}, el("label",{class:"label"},"Notas (opcional)"), notasInput),
    err
  );
  sheet.appendChild(body);

  function guardar(){
    if(!clientaInput.value.trim()){ err.textContent="Escribe el nombre de la clienta."; return; }
    const obj = {
      id: (cita && cita.id) ? cita.id : (Date.now()+"-"+Math.random().toString(36).slice(2,7)),
      hora: horaInput.value, clienta: clientaInput.value.trim(),
      servicios: sel, notas: notasInput.value.trim()
    };
    const arr = state.citas[dateKey] ? state.citas[dateKey].slice() : [];
    if(cita && cita.id){
      const i = arr.findIndex(x=>x.id===cita.id);
      if(i>=0) arr[i]=obj; else arr.push(obj);
    } else arr.push(obj);
    state.citas = Object.assign({}, state.citas); state.citas[dateKey]=arr;
    save(); closeOverlays(); render(); toast("Cita guardada");
  }
  function borrar(){
    const arr = (state.citas[dateKey]||[]).filter(x=>x.id!==cita.id);
    const nc = Object.assign({}, state.citas);
    if(arr.length) nc[dateKey]=arr; else delete nc[dateKey];
    state.citas = nc; save(); closeOverlays(); render(); toast("Cita eliminada");
  }

  const actions = el("div",{style:{display:"flex",gap:"8px",marginTop:"20px"}});
  if(cita){
    actions.appendChild(el("button",{"aria-label":"Eliminar cita",
      style:{height:"48px",width:"48px",display:"grid",placeItems:"center",borderRadius:"12px",flexShrink:"0",background:"#F4E6E4",color:"var(--danger)"},
      onClick:borrar}, icon("trash",18)));
  }
  actions.appendChild(el("button",{class:"primary",style:{flex:"1",height:"48px"}, onClick:guardar},"Guardar"));
  sheet.appendChild(actions);

  document.body.appendChild(overlay);
  setTimeout(()=>{ if(!cita) clientaInput.focus(); }, 50);
}

/* ============ modal ajustes ============ */
function openSettings(){
  closeOverlays();
  const { overlay, sheet } = buildSheet();

  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}},"Ajustes"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  ));

  // backup
  const backup = el("div",{style:{marginBottom:"20px"}},
    el("p",{style:{fontSize:"12px",fontWeight:"500",margin:"0 0 8px",color:"var(--muted)"}},"Copia de seguridad"),
    el("div",{style:{display:"flex",gap:"8px"}},
      el("button",{class:"primary",style:{flex:"1",height:"44px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",fontSize:"14px"},
        onClick:exportar}, icon("download",16),"Exportar"),
      el("button",{style:{flex:"1",height:"44px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",fontSize:"14px",
        background:"#fff",border:"1px solid var(--line)",borderRadius:"12px",color:"var(--ink)",fontWeight:"500"},
        onClick:()=>$("#fileInput").click()}, icon("upload",16),"Importar")
    ),
    el("p",{style:{fontSize:"11px",lineHeight:"1.4",margin:"8px 0 0",color:"var(--muted)"}},
      "Exporta de vez en cuando y guarda el archivo. Así tendrás un respaldo aunque cambies de móvil.")
  );
  sheet.appendChild(backup);

  // sabado
  const knob = el("span",{style:{position:"absolute",top:"2px",height:"24px",width:"24px",borderRadius:"9999px",background:"#fff",
    boxShadow:"0 1px 3px rgba(0,0,0,.2)",transition:"transform .15s",transform: state.incluirSabado?"translateX(22px)":"translateX(2px)"}});
  const sw = el("button",{"aria-label":"Mostrar sábados",
    style:{position:"relative",height:"28px",width:"48px",borderRadius:"9999px",transition:"background .15s",background: state.incluirSabado?"var(--accent)":"var(--line)"},
    onClick:()=>{ state.incluirSabado=!state.incluirSabado; save(); render(); openSettings(); }}, knob);
  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}},
    el("span",{style:{fontSize:"14px"}},"Mostrar sábados"), sw));

  // servicios
  sheet.appendChild(el("p",{style:{fontSize:"12px",fontWeight:"500",margin:"0 0 8px",color:"var(--muted)"}},"Mis servicios y precios"));
  const nombreInput = el("input",{class:"field",placeholder:"Servicio…",style:{flex:"1",minWidth:"0",fontSize:"14px"}});
  const precioInput = el("input",{class:"field",inputmode:"decimal",placeholder:"€",style:{width:"60px",textAlign:"center",fontSize:"14px"}});
  function añadir(){
    const n = nombreInput.value.trim();
    if(!n || state.servicios.some(s=>s.nombre===n)){ nombreInput.value=""; precioInput.value=""; return; }
    const pv = precioInput.value.trim().replace(",",".");
    const p = pv==="" ? null : Number(pv);
    state.servicios = state.servicios.concat([{ nombre:n, precio: Number.isFinite(p)?p:null }]);
    save(); render(); openSettings();
  }
  nombreInput.addEventListener("keydown",e=>{ if(e.key==="Enter") añadir(); });
  precioInput.addEventListener("keydown",e=>{ if(e.key==="Enter") añadir(); });
  sheet.appendChild(el("div",{style:{display:"flex",gap:"8px",marginBottom:"12px"}},
    nombreInput, precioInput,
    el("button",{class:"primary","aria-label":"Añadir servicio",style:{height:"44px",width:"44px",display:"grid",placeItems:"center",flexShrink:"0"},
      onClick:añadir}, icon("plus",18))
  ));

  const servList = el("div",{style:{display:"flex",flexDirection:"column",gap:"6px",maxHeight:"240px",overflowY:"auto"}});
  state.servicios.forEach(s=>{
    const pInput = el("input",{class:"tabnum",inputmode:"decimal",placeholder:"—",
      style:{width:"56px",textAlign:"center",borderRadius:"8px",padding:"6px 8px",fontSize:"14px",background:"var(--bg)",border:"1px solid var(--line)",color:"var(--ink)"}});
    pInput.value = (typeof s.precio==="number") ? s.precio : "";
    pInput.addEventListener("change",()=>{
      const v = pInput.value.trim().replace(",",".");
      const np = v==="" ? null : Number(v);
      state.servicios = state.servicios.map(x=> x.nombre===s.nombre ? {nombre:x.nombre, precio: Number.isFinite(np)?np:null} : x);
      save(); render();
    });
    const row = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",background:"#fff",border:"1px solid var(--line)",borderRadius:"12px",padding:"8px 14px"}},
      el("span",{class:"truncate",style:{flex:"1",minWidth:"0",fontSize:"14px"}}, s.nombre),
      el("div",{style:{display:"flex",alignItems:"center",gap:"4px"}}, pInput, el("span",{style:{fontSize:"14px",color:"var(--muted)"}},"€")),
      el("button",{"aria-label":"Eliminar "+s.nombre,style:{padding:"4px",color:"var(--muted)"},
        onClick:()=>{ state.servicios = state.servicios.filter(x=>x.nombre!==s.nombre); save(); render(); openSettings(); }}, icon("x",16))
    );
    servList.appendChild(row);
  });
  sheet.appendChild(servList);

  document.body.appendChild(overlay);
}

/* ============ modal búsqueda ============ */
function openSearch(){
  closeOverlays();
  const { overlay, sheet } = buildSheet();
  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}},"Buscar"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  ));
  const input = el("input",{class:"field",placeholder:"Clienta o servicio…"});
  const results = el("div",{style:{display:"flex",flexDirection:"column",gap:"6px",marginTop:"10px"}});
  function renderResults(){
    results.innerHTML="";
    const q = input.value.trim().toLowerCase();
    if(!q) return;
    const out=[];
    for(const k in state.citas){
      state.citas[k].forEach(c=>{
        const enServ = (c.servicios||[]).some(s=>s.toLowerCase().indexOf(q)>=0);
        if((c.clienta||"").toLowerCase().indexOf(q)>=0 || enServ) out.push(Object.assign({dateKey:k},c));
      });
    }
    out.sort((a,b)=>(a.dateKey+a.hora).localeCompare(b.dateKey+b.hora));
    if(out.length===0){ results.appendChild(el("p",{style:{fontSize:"14px",padding:"0 4px",color:"var(--muted)"}},"Sin resultados.")); return; }
    out.forEach(c=>{
      results.appendChild(el("button",{style:{textAlign:"left",borderRadius:"12px",padding:"8px 12px",display:"flex",alignItems:"center",gap:"12px",background:"#fff",border:"1px solid var(--line)"},
        onClick:()=>{ selectedKey=c.dateKey; closeOverlays(); render(); }},
        el("span",{class:"tabnum",style:{fontSize:"12px",width:"44px",color:"var(--accent)"}}, c.hora||"—"),
        el("span",{style:{flex:"1",minWidth:"0"}},
          el("span",{class:"truncate",style:{display:"block",fontSize:"14px",fontWeight:"500"}}, c.clienta),
          el("span",{class:"truncate",style:{display:"block",fontSize:"12px",color:"var(--muted)"}}, (c.servicios||[]).join(" + ")+" · "+cap(fmtDiaLargo(fromKey(c.dateKey))))
        )
      ));
    });
  }
  input.addEventListener("input", renderResults);
  sheet.appendChild(input);
  sheet.appendChild(results);
  document.body.appendChild(overlay);
  setTimeout(()=>input.focus(), 50);
}

/* ============ modal calendario mensual ============ */
function openMonthView(){
  closeOverlays();
  const base = fromKey(selectedKey);
  let viewMonth = new Date(base.getFullYear(), base.getMonth(), 1);
  const { overlay, sheet } = buildSheet();
  const todayKey = toKey(new Date());

  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}},"Calendario"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  ));
  sheet.appendChild(el("p",{style:{fontSize:"12px",margin:"0 0 14px",color:"var(--muted)"}},"Días con citas y días libres, de un vistazo."));

  const nav = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}});
  const monthLabel = el("p",{class:"serif",style:{fontSize:"16px",margin:"0"}});
  nav.appendChild(el("button",{class:"ico","aria-label":"Mes anterior",
    onClick:()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1); renderGrid(); }}, icon("chevron-left",18)));
  nav.appendChild(monthLabel);
  nav.appendChild(el("button",{class:"ico","aria-label":"Mes siguiente",
    onClick:()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,1); renderGrid(); }}, icon("chevron-right",18)));
  sheet.appendChild(nav);

  const headersRow = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:"6px"}});
  ["L","M","X","J","V","S","D"].forEach(d=>{
    headersRow.appendChild(el("span",{style:{textAlign:"center",fontSize:"10px",fontWeight:"500",letterSpacing:".5px",textTransform:"uppercase",color:"var(--muted)"}}, d));
  });
  sheet.appendChild(headersRow);

  const cellsWrap = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"5px",marginBottom:"14px"}});
  sheet.appendChild(cellsWrap);

  function esLaboral(d){
    const day = d.getDay(); // 0=domingo
    if(day===0) return false;
    if(day===6) return state.incluirSabado;
    return true;
  }

  function renderGrid(){
    monthLabel.textContent = cap(fmtMes(viewMonth));
    cellsWrap.innerHTML = "";
    const gridStart = startOfWeek(viewMonth);
    for(let i=0;i<42;i++){
      const d = addDays(gridStart,i);
      const inMonth = d.getMonth()===viewMonth.getMonth();
      const k = toKey(d);
      const count = (state.citas[k]||[]).length;
      const laboral = esLaboral(d);
      const isToday = k===todayKey;
      const isSel = k===selectedKey;
      const covered = laboral && count>0;
      const cell = el("button",{
        style:{position:"relative",aspectRatio:"1",borderRadius:"10px",
          display:"flex",alignItems:"center",justifyContent:"center",
          opacity: inMonth ? "1" : ".3",
          background: covered ? "var(--accent)" : "var(--paper)",
          border: "1px solid "+(isSel ? "var(--accent)" : "var(--line)"),
          color: covered ? "#fff" : (laboral ? "var(--ink)" : "var(--muted)")},
        onClick:()=>{ selectedKey=k; closeOverlays(); render(); }
      }, el("span",{class:"tabnum",style:{fontSize:"13px",fontWeight:isToday?"700":"400"}}, String(d.getDate())));
      if(isToday){
        cell.appendChild(el("span",{style:{position:"absolute",bottom:"4px",height:"3px",width:"3px",borderRadius:"9999px",
          background: covered ? "#fff" : "var(--accent)"}}));
      }
      cellsWrap.appendChild(cell);
    }
  }
  renderGrid();

  sheet.appendChild(el("div",{style:{display:"flex",gap:"16px",fontSize:"12px",color:"var(--muted)"}},
    el("span",{style:{display:"flex",alignItems:"center",gap:"6px"}},
      el("span",{style:{height:"12px",width:"12px",borderRadius:"4px",background:"var(--accent)",display:"inline-block"}}), "Con citas"),
    el("span",{style:{display:"flex",alignItems:"center",gap:"6px"}},
      el("span",{style:{height:"12px",width:"12px",borderRadius:"4px",background:"var(--paper)",border:"1px solid var(--line)",display:"inline-block"}}), "Libre")
  ));

  document.body.appendChild(overlay);
}

/* ============ backup ============ */
function exportar(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "agenda-backup-"+toKey(new Date())+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("Backup descargado");
}
$("#fileInput").addEventListener("change", function(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const p = JSON.parse(reader.result);
      if(!p.citas) throw new Error("formato");
      const s = normServicios(p.servicios);
      state = {
        citas: normCitas(p.citas),
        servicios: s.length ? s : state.servicios,
        incluirSabado: typeof p.incluirSabado==="boolean" ? p.incluirSabado : state.incluirSabado,
      };
      save(); closeOverlays(); render(); toast("Backup restaurado");
    }catch(err){ toast("El archivo no es un backup válido"); }
  };
  reader.readAsText(file);
  e.target.value="";
});

/* ============ arranque ============ */
load();
render();
</script>
</body>
